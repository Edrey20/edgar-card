<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edgar | Digital Card</title>

<style>

body{
font-family: Arial;
background:linear-gradient(135deg,#000000,#434343);
margin:0;
text-align:center;
color:white;
}

.card{
background:white;
color:black;
max-width:350px;
margin:60px auto;
padding:30px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.profile{
width:110px;
border-radius:50%;
margin-bottom:10px;
}

h1{
margin:5px;
}

.title{
color:gray;
margin-bottom:20px;
}

.btn{
display:block;
padding:12px;
margin:10px 0;
border-radius:8px;
text-decoration:none;
color:white;
background:#0073ff;
font-weight:bold;
}

.btn:hover{
background:#0055cc;
}

.social{
margin-top:15px;
}

.social a{
margin:0 10px;
font-size:22px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<img class="profile" src="https://i.imgur.com/yourphoto.png">

<h1>Edgar</h1>
<div class="title">Entrepreneur</div>

<a class="btn" href="tel:+1234567890">📞 Call Me</a>

<a class="btn" href="mailto:you@email.com">📧 Email Me</a>

<a class="btn" href="contact.vcf">💾 Save Contact</a>

<a class="btn" href="https://instagram.com">📸 Instagram</a>

<a class="btn" href="https://linkedin.com">💼 LinkedIn</a>

<a class="btn" href="https://paypal.me">💳 Send Tip</a>

</div>

</body>
</html>
